dce3ec;font-size:12px;margin-top:12px}th,td{border-bottom:1px solid #dce3ec;padding:7px;text-align:right}th:first-child,td:first-child{text-align:left}tr.best{background:#ecfbf9;color:#12615d;font-weight:900}pre{background:#101522;color:#d8e4ff;border-radius:16px;padding:12px;max-height:210px;overflow:auto;font-size:12px;white-space:pre-line}@media(max-width:860px){.layout{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.nav{flex-direction:column}}

<body><main>
<nav class="nav"><a href="./start.html">研究Web スタート</a><div><a href="./demo-map.html">デモ一覧</a> / <a href="./progress-latest.html">最新進捗</a> / <a href="./literature.html">参考文献</a></div></nav>
<section class="card"><span class="badge">Main Candidate</span><span class="badge">Lab ΔE</span><span class="badge">J objective</span><h1>B_color / J評価を入れた<br>メインデモ候補</h1><p>既存トップを壊さず、実画像セルの Lab ΔE ベース B_color と、正則化付き J 評価による λ 探索を確認するページです。</p><div class="note">J = αP + (1-α)B_color + β(s-τ)^2 + γ(λ-λ0)^2。小さい J の λ を採用します。</div></section>
<section class="card"><h2>入力と操作</h2><div class="toolbar"><button class="blue" id="templateBtn">テンプレ画像</button><button id="randomBtn">ランダム初期解</button><button class="green" id="alignBtn">同位置初期解</button><button class="blue" id="lambdaBtn">J評価でλ探索</button><button class="green" id="searchBtn">UIサーチ</button><button class="light" id="bestBtn">ベストへ戻す</button><label>分割数 <select id="gridSel"><option>6</option><option selected>8</option><option>10</option><option>12</option></select></label></div><div class="uploads"><label>画像1 <input id="file0" type="file" accept="image/*"></label><label>画像2 <input id="file1" type="file" accept="image/*"></label><label>画像3 <input id="file2" type="file" accept="image/*"></label></div></section>
<section class="card"><div class="layout"><div><canvas id="canvas" width="600" height="600"></canvas><div id="tabs" class="tabs"></div></div><div><div class="stats"><div class="stat"><b id="lambdaStat">0.35</b><span>λC</span></div><div class="stat"><b id="jStat">-</b><span>J</span></div><div class="stat"><b id="pStat">-</b><span>P</span></div><div class="stat"><b id="bStat">-</b><span>B_color</span></div><div class="stat"><b id="sStat">-</b><span>色寄与率 s</span></div><div class="stat"><b id="iterStat">0</b><span>UI試行</span></div></div><div id="tableBox"></div><div class="note" id="message">テンプレ画像を生成中です。</div><pre id="log"></pre></div></div></section>
</main><script src="./main-bcolor-demo.js"></script></body></html>
